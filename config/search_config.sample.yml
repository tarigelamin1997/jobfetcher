# JobFetcher — search spec (SAMPLE · the complete user-input template, safe to commit)
#
# Every field below is REQUIRED and validated by src/jobfetcher/core/search_spec.py (SearchSpec)
# at load — NOTHING is assumed. Copy this to config/search_config.local.yml (gitignored)
# and fill it for your own search. An incomplete/invalid file fails loudly.
#
# To CHANGE your settings on a deployed stack: edit config/search_config.local.yml, then run
#   python scripts/push_config.py
# It validates + uploads to S3; the next pipeline run uses it — NO rebuild/redeploy (ADR-0022).
# Decided in ADR-0010 (addendum) + ADR-0022 + plan §20/§21/§38.

source: jsearch                  # ADR-0010 (the source adapter)

# ── Secrets (AWS Secrets Manager — never env/repo for real runs) ──────────
secret_name: jobfetcher/jsearch  # SecretString JSON: {"api_key": "..."}
aws_region: us-east-1            # where the secret + all jobfetcher infra live

# ── Targeting — the user fills these (the four fields) ─────────────────────
targeting:
  job_titles:                    # -> JSearch `query` text (the role). Must be non-empty.
    - "Data Engineer"
    - "Data Platform Engineer"
    - "Data Architect"
  countries:                     # -> JSearch `country` param; ISO-3166-1 alpha-2. Non-empty.
    - sa                         # Saudi Arabia (primary)
    - ae                         # United Arab Emirates
    - qa                         # Qatar
    - kw                         # Kuwait
    - bh                         # Bahrain
    - om                         # Oman
  cities: []                     # -> gold filter on job_city.  [] = all cities in the country.
  states: []                     # -> gold filter on job_state. [] = none (usually null for GCC).

# ── Knobs — also explicit, no silent defaults ─────────────────────────────
date_posted: month               # all | today | 3days | week | month  (30-day backfill)
language: en                     # English metadata + populates job_city/country + the UTC ts
employment_types: []             # FULLTIME | PARTTIME | CONTRACTOR | INTERN; [] = no filter (a bad value fails at load)
remote: "off"                    # "off" (on-site) | "include" (flag) | "only" (remote_jobs_only)

# ── How strict is your shortlist? (the three matching knobs, each 0..100) ──
# Every job gets a 0-100 fit score. These three decide what you receive + how each
# job is labelled. Edit freely — a change takes effect on the next run (the config
# is the source of truth, re-synced every run).
threshold: 60                    # ONLY email me jobs scoring at least this. Higher = stricter.
hard_floor: 50                   # below this a job is "misaligned" + ignored (must be <= threshold).
near_miss_band: 10               # how far below threshold still counts as "almost" (a near-miss).
# NOTE: today only `threshold` changes what lands in your inbox. hard_floor + near_miss_band
# also tag every job (strong_fit | near_miss | stretch | misaligned) to power the upcoming
# near-miss-watch feature (resurface a job that was *almost* a fit once you gain a skill).

# ── Reassess age bound (the {"mode":"reassess"} replay) ────────────────────
# Only re-score postings fetched within the last N days — an old posting is likely filled,
# so replaying it forever just burns LLM tokens. 0 = no cutoff (replay everything). 0..365.
reassess_max_age_days: 45              # recommended: 45

# ── Request-budget guardrails (free Basic = 200 req/mo) ──────────────────
budget:
  max_pages_per_query: 5         # ~10 results/page, ~1 request/page
  request_budget_per_run: 70     # hard ceiling for one sweep (fits free 200/mo)

# Probe-confirm: does num_pages=N bill as N requests or 1?
# /search has limited pagination depth; /search-v2 uses a cursor for deeper pages.
